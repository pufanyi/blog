<section class="abstract" id="abstract">
  <h2 class="abstract-heading">Abstract</h2>
  <div class="abstract-content">
    @for (para of data().paragraphs; track $index) {
      <p [innerHTML]="para"></p>
    }
  </div>
  <div class="keywords">
    <span class="keywords-label">Keywords: </span>
    {{ data().keywords.join(' · ') }}
  </div>
</section>

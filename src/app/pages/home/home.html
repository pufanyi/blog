<div class="title-block">
  <div class="title-wrapper">
    <hr class="title-rule-top" />
    <h1 class="title">Fanyi's Blog</h1>
    <hr class="title-rule-bottom" />
  </div>
  <p class="title-subtitle">{{ posts.length }} notes, derivations, and contest scraps</p>
</div>

<section class="post-list" appAutoAnimate [appAutoAnimateOptions]="{ duration: 180, easing: 'ease-out' }">
  @for (post of posts; track post.slug) {
    <a class="post-entry" [routerLink]="['/blog', post.slug]">
      @if (post.coverImage) {
        <img
          [ngSrc]="post.coverImage"
          [alt]="post.title"
          width="720"
          height="360"
          [priority]="$first"
        />
      }
      <div class="post-row">
        <span class="post-title">
          <i class="ph ph-file-text" aria-hidden="true"></i>
          <span>{{ post.title }}</span>
        </span>
        <time class="post-date" [attr.datetime]="post.date">{{ post.date }}</time>
      </div>
      <div class="post-description">{{ post.description }}</div>
    </a>
  }
</section>
